apiVersion: apps/v1
kind: Deployment


metadata:

  name: payments-db



spec:


  replicas: 1


  selector:


    matchLabels:


      app: payments-db



  template:


    metadata:


      labels:


        app: payments-db



    spec:



      containers:



      - name: payments-db



        image: mcr.microsoft.com/mssql/server:2025-latest



        ports:



        - containerPort: 1433



        env:



        - name: ACCEPT_EULA

          value: "Y"



        - name: MSSQL_PID

          value: "Developer"



        - name: SA_PASSWORD


          valueFrom:


            secretKeyRef:


              name: payments-secret


              key: SA_PASSWORD



        resources:



          limits:


            memory: "1500Mi"



          requests:


            memory: "1000Mi"



        volumeMounts:



        - name: payments-storage


          mountPath: /var/opt/mssql





      volumes:



      - name: payments-storage



        persistentVolumeClaim:



          claimName: payments-pvc